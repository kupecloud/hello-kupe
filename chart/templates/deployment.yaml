apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hello-kupe.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hello-kupe.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hello-kupe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hello-kupe.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        # Required by the platform's `platform-require-seccomp` Kyverno
        # policy. Set at the pod level so every container in the pod
        # inherits it; container-level securityContext (below) keeps the
        # container-only fields like capability drop and read-only rootfs.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hello-kupe
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: SERVICE_NAME
              value: {{ include "hello-kupe.fullname" . | quote }}
            - name: TENANT
              value: {{ .Values.tenant | quote }}
            - name: PUBLIC_URL
              value: {{ printf "https://%s" (include "hello-kupe.hostname" .) | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
