{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "hello-kupe.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hello-kupe.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gatewayName }}
      namespace: {{ .Values.httpRoute.gatewayNamespace }}
  hostnames:
    - {{ include "hello-kupe.hostname" . | quote }}
  rules:
    # Expose only application paths — /metrics, /healthz, /readyz are
    # internal-only (scraped by Alloy, probed by kubelet).
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: Exact
            value: /
      backendRefs:
        - name: {{ include "hello-kupe.fullname" . }}
          port: 80
{{- end }}
