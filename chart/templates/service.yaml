apiVersion: v1
kind: Service
metadata:
  name: {{ include "hello-kupe.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hello-kupe.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "hello-kupe.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
