name: Publish Image

on:
  workflow_call:
    inputs:
      version:
        description: Semantic release version without the leading v
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write # Required for cosign keyless signing

jobs:
  publish:
    uses: kupecloud/github-workflows/.github/workflows/publish-image.yaml@75f2bc349709d9fec6630dbd937301d1a32708e0 # v1.1.0
    with:
      version: ${{ inputs.version }}
    secrets: inherit
