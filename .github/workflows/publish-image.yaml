name: Publish Image

on:
  workflow_call:
    inputs:
      version:
        description: Semantic release version without the leading v
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write # Required for cosign keyless signing

jobs:
  publish:
    uses: kupecloud/github-workflows/.github/workflows/publish-image.yaml@11b5503fe90f8de8fa6c7ceb32ef693f32524722 # v1.0.0
    with:
      version: ${{ inputs.version }}
    secrets: inherit
