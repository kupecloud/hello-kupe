name: Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-lint:
    name: Go Lint
    uses: ./.github/workflows/go-lint.yaml

  action-lint:
    name: Action Lint
    uses: ./.github/workflows/action-lint.yaml

  helm-lint:
    name: Helm Lint
    uses: ./.github/workflows/helm-lint.yaml

  unit-tests:
    name: Unit Tests
    needs:
      - go-lint
      - action-lint
      - helm-lint
    uses: ./.github/workflows/unit-tests.yaml

  gosec:
    name: Go Security
    needs:
      - unit-tests
    uses: ./.github/workflows/gosec.yaml

  release:
    name: Release
    needs:
      - gosec
    uses: kupecloud/github-workflows/.github/workflows/semantic-release.yaml@56a9721ea10187892bc76c3c8885225990de8323 # v1.13.0
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
      id-token: write
    secrets: inherit

  publish-image:
    name: Publish Image
    needs:
      - release
    if: needs.release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/publish-image.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      version: ${{ needs.release.outputs.new_release_version }}
    secrets: inherit
