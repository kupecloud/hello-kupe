name: Helm Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - "chart/**"
      - ".github/workflows/helm-lint.yaml"
  workflow_call:

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.18.6

      - name: Run helm lint
        run: helm lint ./chart/hello-kupe --set tenant=example-tenant
